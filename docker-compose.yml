services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=devhub
      - POSTGRES_USER=devhub_user
      - POSTGRES_PASSWORD=devhub_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devhub_user -d devhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=docker-secret-key-123
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - DJANGO_DB_ENGINE=django.db.backends.postgresql
      - DJANGO_DB_NAME=devhub
      - DJANGO_DB_USER=devhub_user
      - DJANGO_DB_PASSWORD=devhub_pass
      - DJANGO_DB_HOST=db
      - DJANGO_DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
