services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=devhub
      - POSTGRES_USER=devhub_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devhub_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devhub_user -d devhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_DB_URL=postgres://devhub_user:${POSTGRES_PASSWORD:-devhub_pass}@db:5432/devhub
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_DB_URL=postgres://devhub_user:${POSTGRES_PASSWORD:-devhub_pass}@db:5432/devhub
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
