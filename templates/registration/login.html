{% extends "devhub_app/base.html" %}
{% block title %}Login | DevHub{% endblock %}
{% block body %}
<main class="max-w-md mx-auto px-6 py-16">
    <section class="glass-card rounded-[2rem] p-8 shadow-glow">
        <h1 class="text-3xl font-black mb-6">Log In</h1>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div class="field-shell">
                <label class="block text-sm font-bold mb-2">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<p class="text-sm text-red-300 mt-2">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button class="w-full px-6 py-3 rounded-2xl bg-mint text-black font-black">Log In</button>
        </form>
        <div class="flex items-center justify-between gap-4 text-sm text-slate-300 mt-6">
            <a href="{% url 'password_reset' %}" class="text-mint font-bold">Forgot password?</a>
            <span>Need an account? <a href="{% url 'devhub_app:signup' %}" class="text-mint font-bold">Create one</a>.</span>
        </div>
    </section>
</main>
{% endblock %}
