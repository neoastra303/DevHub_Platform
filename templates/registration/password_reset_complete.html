{% extends "devhub_app/base.html" %}
{% block title %}Password Reset Complete | DevHub{% endblock %}
{% block body %}
<main class="min-h-[60vh] flex items-center justify-center px-6 py-16">
    <section class="glass-card rounded-[2.5rem] p-8 md:p-10 shadow-glow max-w-lg w-full text-center">
        <div class="w-16 h-16 rounded-2xl bg-mint/10 flex items-center justify-center mx-auto mb-6">
            <i data-lucide="check-circle" class="w-8 h-8 text-mint"></i>
        </div>
        <h1 class="text-3xl font-black mb-3">Password Reset Complete</h1>
        <p class="text-slate-400 mb-8">Your password has been successfully reset. You can now log in with your new password.</p>
        <a href="{% url 'devhub_app:login' %}" class="inline-flex items-center gap-2 px-8 py-4 rounded-2xl bg-mint text-black font-black hover:scale-105 transition-all shadow-lg shadow-mint/10 ripple-container">Log In</a>
    </section>
</main>
{% endblock %}
