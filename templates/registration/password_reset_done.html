{% extends "devhub_app/base.html" %}
{% block title %}Check Email | DevHub{% endblock %}
{% block body %}
<main class="min-h-[60vh] flex items-center justify-center px-6 py-16">
    <section class="glass-card rounded-[2.5rem] p-8 md:p-10 shadow-glow max-w-lg w-full text-center">
        <div class="w-16 h-16 rounded-2xl bg-mint/10 flex items-center justify-center mx-auto mb-6">
            <i data-lucide="mail" class="w-8 h-8 text-mint"></i>
        </div>
        <h1 class="text-3xl font-black mb-3">Check Your Email</h1>
        <p class="text-slate-400 leading-relaxed">We've sent password reset instructions to your email address if it's registered with us.</p>
        <a href="{% url 'devhub_app:login' %}" class="inline-flex items-center gap-2 mt-8 text-mint font-bold hover:underline">Back to login</a>
    </section>
</main>
{% endblock %}
