{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 - Server Error | DevHub</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link rel="icon" type="image/svg+xml" href="https://api.dicebear.com/7.x/bottts/svg?seed=devhub">
</head>
<body class="min-h-screen bg-ink text-white flex items-center justify-center px-6">
    <div class="text-center space-y-8 max-w-lg">
        <div class="relative">
            <p class="text-[10rem] font-black text-white/5 leading-none select-none">500</p>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-24 h-24 rounded-3xl bg-coral/10 border border-coral/20 flex items-center justify-center">
                    <i data-lucide="server-crash" class="w-12 h-12 text-coral"></i>
                </div>
            </div>
        </div>
        
        <div class="space-y-3">
            <h1 class="text-4xl font-black tracking-tight">Something went wrong</h1>
            <p class="text-slate-400 text-lg">Our server encountered an unexpected error. Our team has been notified.</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="/" class="px-6 py-3 rounded-2xl bg-mint text-ink font-bold shadow-lg shadow-mint/20 hover:scale-105 transition-all">
                <i data-lucide="refresh-cw" class="w-4 h-4 inline-block mr-2"></i>
                Try Again
            </a>
            <a href="javascript:history.back()" class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-slate-300 font-bold hover:bg-white/10 transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4 inline-block mr-2"></i>
                Go Back
            </a>
        </div>
    </div>

    <script src="{% static 'vendor/lucide.min.js' %}"></script>
    <script>if(window.lucide) lucide.createIcons();</script>
</body>
</html>
