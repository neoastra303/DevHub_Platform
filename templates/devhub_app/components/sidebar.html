{% comment %}
    Component: Desktop Sidebar Navigation
    Requires: user (authenticated), request.resolver_match.url_name
{% endcomment %}
<aside id="sidebar" class="hidden md:flex flex-col w-64 min-h-screen bg-ink/60 border-r border-white/5 backdrop-blur-xl sticky top-0 left-0 z-30 transition-all duration-300" x-data="{ collapsed: false }">
    <!-- Logo -->
    <div class="px-6 py-5 border-b border-white/5 flex items-center gap-3">
        <a href="{% url 'devhub_app:dashboard' %}" class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-lg bg-mint flex items-center justify-center text-ink flex-shrink-0">
                <i data-lucide="terminal" class="w-5 h-5"></i>
            </div>
            <span class="text-lg font-black tracking-tight">DevHub</span>
        </a>
    </div>

    <!-- Primary Nav -->
    <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
        <p class="px-3 mb-3 text-2xs uppercase tracking-[0.2em] font-bold text-slate-600">Workspace</p>

        <a href="{% url 'devhub_app:dashboard' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
        </a>

        <a href="{% url 'devhub_app:feed' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'feed' %}active{% endif %}">
            <i data-lucide="rss"></i>
            <span>Feed</span>
        </a>

        <a href="{% url 'devhub_app:project-create' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'project-create' %}active{% endif %}">
            <i data-lucide="folder-plus"></i>
            <span>New Project</span>
        </a>

        <a href="{% url 'devhub_app:post-create' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'post-create' %}active{% endif %}">
            <i data-lucide="pen-tool"></i>
            <span>New Post</span>
        </a>

        <hr class="my-4 border-white/5">

        <p class="px-3 mb-3 text-2xs uppercase tracking-[0.2em] font-bold text-slate-600">Insights</p>

        <a href="{% url 'devhub_app:audit' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'audit' %}active{% endif %}">
            <i data-lucide="activity"></i>
            <span>Audit Log</span>
        </a>

        <a href="{% url 'devhub_app:transactions' %}"
           class="sidebar-link {% if request.resolver_match.url_name == 'transactions' %}active{% endif %}">
            <i data-lucide="credit-card"></i>
            <span>Transactions</span>
        </a>
    </nav>

    <!-- User Footer -->
    <div class="px-3 py-4 border-t border-white/5">
        <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors">
            <div class="w-9 h-9 rounded-xl overflow-hidden border border-white/10 flex-shrink-0">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed={{ user.profile.avatar_seed }}" alt="Avatar" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold truncate">{{ user.get_full_name|default:user.username }}</p>
                <p class="text-2xs text-slate-500 truncate">@{{ user.username }}</p>
            </div>
            <a href="{% url 'devhub_app:profile' %}" class="p-2 rounded-lg hover:bg-white/5 transition-colors" data-tooltip="Profile">
                <i data-lucide="settings" class="w-4 h-4 text-slate-500"></i>
            </a>
        </div>
    </div>
</aside>
