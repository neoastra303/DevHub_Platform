{# Reusable skeleton loading component #}
{# Usage: {% include "devhub_app/components/skeleton.html" with variant="card" %} #}
{% if variant == "card" %}
<div class="glass-card rounded-3xl p-6 animate-pulse" aria-hidden="true">
    <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl bg-white/5"></div>
        <div class="flex-1 space-y-2">
            <div class="h-4 bg-white/5 rounded-lg w-1/3"></div>
            <div class="h-3 bg-white/5 rounded-lg w-1/2"></div>
        </div>
    </div>
    <div class="space-y-3">
        <div class="h-3 bg-white/5 rounded-lg w-full"></div>
        <div class="h-3 bg-white/5 rounded-lg w-4/5"></div>
        <div class="h-3 bg-white/5 rounded-lg w-2/3"></div>
    </div>
    <div class="flex gap-2 mt-5 pt-5 border-t border-white/5">
        <div class="h-6 w-16 rounded-full bg-white/5"></div>
        <div class="h-6 w-20 rounded-full bg-white/5"></div>
    </div>
</div>

{% elif variant == "stat" %}
<div class="glass-card rounded-[2rem] p-6 animate-pulse" aria-hidden="true">
    <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 rounded-xl bg-white/5"></div>
        <div class="h-4 w-12 rounded-full bg-white/5"></div>
    </div>
    <div class="h-3 bg-white/5 rounded-lg w-1/2 mb-2"></div>
    <div class="h-8 bg-white/5 rounded-lg w-1/3"></div>
</div>

{% elif variant == "list-item" %}
<div class="glass-card-interactive rounded-3xl p-5 animate-pulse" aria-hidden="true">
    <div class="flex items-start justify-between gap-4 mb-3">
        <div class="h-4 bg-white/5 rounded-lg w-2/3"></div>
        <div class="w-4 h-4 rounded bg-white/5"></div>
    </div>
    <div class="space-y-2 mb-4">
        <div class="h-3 bg-white/5 rounded-lg w-full"></div>
        <div class="h-3 bg-white/5 rounded-lg w-3/4"></div>
    </div>
    <div class="flex items-center justify-between pt-4 border-t border-white/5">
        <div class="flex gap-4">
            <div class="h-3 w-12 rounded bg-white/5"></div>
            <div class="h-3 w-12 rounded bg-white/5"></div>
        </div>
        <div class="h-3 w-16 rounded bg-white/5"></div>
    </div>
</div>

{% elif variant == "table-row" %}
<div class="flex items-center gap-4 p-4 animate-pulse" aria-hidden="true">
    <div class="w-8 h-8 rounded-lg bg-white/5"></div>
    <div class="flex-1 space-y-2">
        <div class="h-3 bg-white/5 rounded-lg w-1/4"></div>
        <div class="h-2 bg-white/5 rounded-lg w-1/6"></div>
    </div>
    <div class="h-6 w-20 rounded-full bg-white/5"></div>
</div>

{% elif variant == "chart" %}
<div class="glass-card rounded-[2.5rem] p-6 md:p-8 animate-pulse" aria-hidden="true">
    <div class="flex items-center justify-between mb-6">
        <div class="h-6 bg-white/5 rounded-lg w-1/4"></div>
        <div class="h-6 bg-white/5 rounded-full w-20"></div>
    </div>
    <div class="h-[280px] bg-white/5 rounded-xl"></div>
</div>
{% endif %}
