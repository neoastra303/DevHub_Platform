<tr id="job-row-{{ job.id }}" class="border-t border-white/10"
    {% if job.status == 'queued' or job.status == 'running' %}
    hx-get="{% url 'api-job-detail' job.id %}"
    hx-trigger="every 3s"
    hx-swap="outerHTML"
    {% endif %}
>
    <td class="p-5">{{ job.get_job_type_display }}</td>
    <td class="p-5 font-bold 
        {% if job.status == 'succeeded' %}text-mint
        {% elif job.status == 'failed' %}text-coral
        {% else %}text-slate-400{% endif %}">
        {{ job.get_status_display }}
    </td>
    <td class="p-5 text-slate-300">{{ job.created_at|date:"M d, Y H:i" }}</td>
    <td class="p-5">
        {% if job.status == "succeeded" %}
        <a href="{% url 'api-job-download' job.id %}" class="text-mint font-bold hover:underline">Download</a>
        {% elif job.status == "failed" %}
        <span class="text-red-300">{{ job.error_message }}</span>
        {% else %}
        <span class="text-slate-400">Processing...</span>
        {% endif %}
    </td>
</tr>
