{% extends "devhub_app/base.html" %}
{% block title %}404 - Page Not Found | DevHub{% endblock %}
{% block body %}
<main class="min-h-[70vh] flex items-center justify-center px-6">
    <div class="text-center space-y-8 max-w-lg">
        <div class="relative">
            <p class="text-[10rem] font-black text-white/5 leading-none select-none">404</p>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-24 h-24 rounded-3xl bg-coral/10 border border-coral/20 flex items-center justify-center">
                    <i data-lucide="map-pin-off" class="w-12 h-12 text-coral"></i>
                </div>
            </div>
        </div>
        
        <div class="space-y-3">
            <h1 class="text-4xl font-black tracking-tight">Page not found</h1>
            <p class="text-slate-400 text-lg">The page you're looking for doesn't exist or has been moved.</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="{% url 'devhub_app:dashboard' %}" class="px-6 py-3 rounded-2xl bg-mint text-ink font-bold shadow-lg shadow-mint/20 hover:scale-105 transition-all">
                <i data-lucide="layout-dashboard" class="w-4 h-4 inline-block mr-2"></i>
                Go to Dashboard
            </a>
            <a href="{% url 'devhub_app:landing' %}" class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-slate-300 font-bold hover:bg-white/10 transition-all">
                <i data-lucide="home" class="w-4 h-4 inline-block mr-2"></i>
                Back to Home
            </a>
        </div>
    </div>
</main>
{% endblock %}
