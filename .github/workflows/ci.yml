name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    name: Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  security:
    name: Security Scan (Bandit & pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'
      - name: Install Security Tools
        run: pip install bandit pip-audit
      - name: Run Bandit
        run: bandit -r . -x ./venv,./tests --severity-level medium
      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  test:
    name: Functional Tests
    needs: [lint, security]
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key-must-be-long-and-secure-for-testing-purposes-123
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django checks
        run: python manage.py check
      - name: Collect Static
        run: python manage.py collectstatic --noinput
      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run
      - name: API Schema Check
        run: python manage.py spectacular --file schema.yml
      - name: Tests
        run: python manage.py test
