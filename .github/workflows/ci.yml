name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Bandit & Safety
        run: pip install bandit safety
      - name: Run Bandit
        run: bandit -r . -x ./venv,./tests --severity-level medium
      # Safety check usually requires an API key or a specific file, skipping strict enforcement for now
      # but including it as a standard practice.

  test:
    needs: [lint, security]
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django checks
        run: python manage.py check
      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: python manage.py test
